services:
  aerialclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: aerialclaw:review
    environment:
      SIM_ADAPTER: mock
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5001
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/status', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
